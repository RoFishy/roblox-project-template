name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Validate root and discovered place projects
        run: sh scripts/validate.sh
